<div class="menu-mgmt">
  <div class="mgmt-header">
    <h3>Food Items</h3>
    <button class="btn btn-primary" (click)="showForm=true" *ngIf="!showForm">+ Add Item</button>
  </div>

  <div class="form-card card" *ngIf="showForm">
    <h3>{{ editingItem ? 'Edit Item' : 'New Food Item' }}</h3>
    <form (ngSubmit)="save()" #f="ngForm">
      <div class="form-row">
        <div class="form-group flex-1"><label>Name</label><input type="text" name="name" [(ngModel)]="newItem.name" required></div>
        <div class="form-group flex-1"><label>Category</label><input type="text" name="category" [(ngModel)]="newItem.category" required></div>
      </div>
      <div class="form-row">
        <div class="form-group flex-1"><label>Price ($)</label><input type="number" name="price" [(ngModel)]="newItem.price" required></div>
        <div class="form-group flex-1"><label>Image URL</label><input type="text" name="imageUrl" [(ngModel)]="newItem.imageUrl" placeholder="https://..."></div>
      </div>
      <div class="form-group"><label>Description</label><textarea name="desc" [(ngModel)]="newItem.description" rows="3"></textarea></div>
      <div class="form-actions">
        <button type="button" class="btn" (click)="reset()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="!f.form.valid">{{ editingItem ? 'Save Changes' : 'Add Item' }}</button>
      </div>
    </form>
  </div>

  <div class="table-container card">
    <table class="admin-table">
      <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let item of foodItems">
          <td><img [src]="item.imageUrl || 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=60'" class="thumb"></td>
          <td>{{ item.name }}</td>
          <td>{{ item.category }}</td>
          <td>${{ item.price }}</td>
          <td><span class="badge" [ngClass]="item.isAvailable ? 'badge-success' : 'status-danger'">{{ item.isAvailable ? 'Available' : 'Unavailable' }}</span></td>
          <td class="actions">
            <button class="icon-btn" (click)="edit(item)">✏️</button>
            <button class="icon-btn" (click)="delete(item.id)">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="foodItems.length === 0"><td colspan="6" style="text-align:center;color:var(--text-muted);padding:30px">No food items yet. Add your first one!</td></tr>
      </tbody>
    </table>
  </div>
</div>
