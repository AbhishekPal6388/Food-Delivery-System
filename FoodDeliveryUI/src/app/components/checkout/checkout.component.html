<div class="container checkout-page animate-fade-in">
  <h2>Checkout 🚀</h2>
  <div class="checkout-grid" *ngIf="cartItems.length > 0">
    <div class="delivery-card card">
      <h3>Delivery Details</h3>
      <form #f="ngForm">
        <div class="form-group">
          <label>Full Address</label>
          <input type="text" name="address" [(ngModel)]="delivery.address" required placeholder="Street name, house/apt number">
        </div>
        <div class="form-row">
          <div class="form-group flex-1"><label>City</label><input type="text" name="city" [(ngModel)]="delivery.city" required placeholder="Your city"></div>
          <div class="form-group flex-1"><label>Phone</label><input type="text" name="phone" [(ngModel)]="delivery.phone" required placeholder="For delivery updates"></div>
        </div>
        <div class="payment-section">
          <h3>Payment</h3>
          <div class="payment-option"><span>💵</span><span>Cash on Delivery</span></div>
        </div>
      </form>
    </div>
    <div class="order-summary card">
      <h3>Your Order</h3>
      <div class="order-items-scroll">
        <div class="summary-item" *ngFor="let item of cartItems">
          <span>{{ item.quantity }}x {{ item.foodItem?.name }}</span>
          <span>${{ (item.price * item.quantity).toFixed(2) }}</span>
        </div>
      </div>
      <div class="summary-totals">
        <div class="row"><span>Subtotal</span><span>${{ totalPrice.toFixed(2) }}</span></div>
        <div class="row"><span>Delivery</span><span>$5.00</span></div>
        <div class="row total"><span>Total</span><span>${{ (totalPrice + 5).toFixed(2) }}</span></div>
      </div>
      <button class="btn btn-primary place-order-btn" [disabled]="loading" (click)="placeOrder()">
        {{ loading ? 'Placing Order...' : '🎉 Place Order' }}
      </button>
    </div>
  </div>
</div>
