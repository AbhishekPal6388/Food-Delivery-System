<div class="auth-page animate-fade-in">
  <div class="auth-card card">
    <h2>Create Account 🎉</h2>
    <p>Join FoodDash today and enjoy gourmet meals.</p>
    <form (ngSubmit)="register()" #f="ngForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="user.username" required placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="user.password" required placeholder="Create a password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="user.confirmPassword" required placeholder="Confirm your password">
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn btn-primary auth-btn" [disabled]="!f.form.valid || loading">
        {{ loading ? 'Creating Account...' : 'Register' }}
      </button>
      <div class="auth-footer">Already have an account? <a routerLink="/login">Login here</a></div>
    </form>
  </div>
</div>
