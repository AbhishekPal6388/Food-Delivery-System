<div class="container history-page animate-fade-in">
  <h2>Your Orders 📦</h2>
  <div class="orders-list" *ngIf="orders.length > 0; else noOrders">
    <div class="order-card card" *ngFor="let order of orders">
      <div class="order-header">
        <div class="order-id">
          <strong>Order #FD-{{ order.id }}</strong>
          <span class="order-date">{{ order.orderDate | date:'medium' }}</span>
        </div>
        <span class="badge" [ngClass]="getStatusClass(order.status)">{{ getStatusName(order.status) }}</span>
      </div>
      <div class="order-items">
        <div class="item-row" *ngFor="let item of order.orderItems">
          <span>{{ item.quantity }}x {{ item.foodItem?.name }}</span>
          <span>${{ (item.price * item.quantity).toFixed(2) }}</span>
        </div>
      </div>
      <div class="order-footer">
        <span class="total-label">Total</span>
        <span class="total-value">${{ order.totalAmount }}</span>
      </div>
    </div>
  </div>
  <ng-template #noOrders>
    <div class="empty-state card text-center">
      <span style="font-size:3rem;display:block;margin-bottom:15px">🍱</span>
      <h3>No orders yet</h3>
      <p>Hungry? Start ordering today!</p>
      <button class="btn btn-primary" routerLink="/">Order Now</button>
    </div>
  </ng-template>
</div>
