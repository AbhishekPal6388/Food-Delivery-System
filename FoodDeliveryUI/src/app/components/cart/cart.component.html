<div class="container cart-page animate-fade-in">
  <h2>Your Shopping Cart</h2>

  <div class="cart-container" *ngIf="cartItems.length > 0; else emptyCart">
    <div class="cart-items">
      <div class="cart-item card" *ngFor="let item of cartItems">
        <img [src]="item.foodItem?.imageUrl || 'assets/placeholder-food.jpg'" [alt]="item.foodItem?.name">
        <div class="item-details">
          <h3>{{ item.foodItem?.name }}</h3>
          <p class="price-unit">${{ item.price }} per unit</p>
        </div>
        <div class="quantity-controls">
          <button (click)="updateQuantity(item.foodItemId, item.quantity - 1)">-</button>
          <span>{{ item.quantity }}</span>
          <button (click)="updateQuantity(item.foodItemId, item.quantity + 1)">+</button>
        </div>
        <div class="item-total">
          <p>${{ item.price * item.quantity }}</p>
        </div>
        <button class="remove-btn" (click)="removeItem(item.foodItemId)">✕</button>
      </div>
    </div>

    <div class="cart-summary card">
      <h3>Order Summary</h3>
      <div class="summary-row">
        <span>Subtotal</span>
        <span>${{ totalPrice }}</span>
      </div>
      <div class="summary-row">
        <span>Delivery Fee</span>
        <span>$5.00</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span>${{ totalPrice + 5 }}</span>
      </div>
      <button class="btn btn-primary checkout-btn" routerLink="/checkout">Proceed to Checkout</button>
      <button class="btn btn-secondary" routerLink="/">Continue Shopping</button>
    </div>
  </div>

  <ng-template #emptyCart>
    <div class="empty-state text-center">
      <span class="empty-icon">🛒</span>
      <h3>Your cart is empty</h3>
      <p>Looks like you haven't added anything to your cart yet.</p>
      <button class="btn btn-primary" routerLink="/">Explore Menu</button>
    </div>
  </ng-template>
</div>
