<div class="auth-page animate-fade-in">
  <div class="auth-card card">
    <h2>Welcome Back 👋</h2>
    <p>Please login to your account to continue.</p>
    <form (ngSubmit)="login()" #f="ngForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="credentials.username" required placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required placeholder="Enter your password">
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn btn-primary auth-btn" [disabled]="!f.form.valid || loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
      <div class="auth-footer">Don't have an account? <a routerLink="/register">Register here</a></div>
    </form>
  </div>
</div>
